<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Quote | Clear View Window Co.</title>
<meta name="description" content="Build your custom window cleaning quote in under a minute. Instant estimate, pick your plan, request your date.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --navy:#16284A; --red:#C9473A; --blue:#C8362F; --blue-pale:#FBEEEC;
    --cream:#F6F2EA; --gray-50:#F7F6F3; --gray-500:#5b6473; --gray-600:#444;
    --shadow:0 10px 30px rgba(22,40,74,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--navy);background:var(--gray-50);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:0 1.25rem}

  /* top bar */
  .qb-top{background:#fff;border-bottom:1px solid rgba(22,40,74,.08);position:sticky;top:0;z-index:50}
  .qb-top-inner{max-width:1100px;margin:0 auto;padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .qb-brand{display:flex;align-items:center;gap:.6rem;font-family:'Playfair Display',serif;font-weight:800;font-size:1.15rem;letter-spacing:.02em;color:var(--navy)}
  .qb-brand img{width:34px;height:34px;border-radius:50%}
  .qb-brand small{display:block;font-family:'Inter';font-weight:700;font-size:.6rem;letter-spacing:.18em;color:var(--red)}
  .qb-total{background:var(--blue-pale);color:var(--navy);font-weight:700;font-size:.95rem;padding:.5rem 1rem;border-radius:30px;white-space:nowrap}
  .qb-total b{color:var(--red)}

  /* progress */
  .qb-progress{display:flex;gap:6px;max-width:1180px;margin:1.25rem auto 0;padding:0 1.25rem}
  .qb-progress .seg{height:5px;border-radius:5px;background:rgba(22,40,74,.10);flex:1;transition:background .3s}
  .qb-progress .seg.done{background:var(--red)}
  .qb-progress .seg.cur{background:var(--navy)}

  /* layout: card + sidebar */
  .qb-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:1.5rem;max-width:1180px;margin:1.5rem auto 0;padding:0 1.25rem;align-items:start}
  @media(max-width:920px){ .qb-layout{grid-template-columns:1fr} }

  /* card */
  .qb-card{background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:2.5rem;min-width:0}
  @media(max-width:600px){ .qb-card{padding:1.5rem} }

  /* sidebar — Property Details */
  .qb-side{background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:1.6rem 1.5rem;position:sticky;top:90px}
  @media(max-width:920px){ .qb-side{position:static;order:-1} }
  .qb-side h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:1.1rem}
  .qb-side-row{padding:.85rem 0;border-bottom:1px solid rgba(22,40,74,.08)}
  .qb-side-row:last-child{border-bottom:none}
  .qb-side-k{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-500)}
  .qb-side-v{font-size:.98rem;font-weight:600;margin-top:.35rem;color:var(--navy)}
  .qb-side-v.empty{color:rgba(22,40,74,.3);font-weight:500}
  .qb-side-v.set{color:var(--red)}
  .qb-step-eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red)}
  .qb-h{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,4vw,2.5rem);font-weight:700;margin:.4rem 0 .3rem;line-height:1.1}
  .qb-sub{color:var(--gray-500);margin-bottom:2rem;font-size:1rem}

  /* option grid */
  .opt-grid{display:grid;gap:14px}
  .opt-grid.cols-3{grid-template-columns:repeat(3,1fr)}
  .opt-grid.cols-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:680px){ .opt-grid.cols-3,.opt-grid.cols-2{grid-template-columns:1fr} }
  .opt{border:2px solid rgba(22,40,74,.12);border-radius:16px;padding:1.4rem 1.2rem;cursor:pointer;text-align:center;transition:all .18s;background:#fff;position:relative}
  .opt:hover{border-color:var(--navy);transform:translateY(-2px)}
  .opt.sel{border-color:var(--red);background:var(--blue-pale)}
  .opt .ic{width:46px;height:46px;border-radius:12px;background:var(--gray-50);display:flex;align-items:center;justify-content:center;margin:0 auto .7rem;font-size:1.4rem}
  .opt.sel .ic{background:#fff}
  .opt .t{font-weight:700;font-size:1rem}
  .opt .d{font-size:.82rem;color:var(--gray-500);margin-top:3px}
  .opt.multi.sel::after{content:'\2713';position:absolute;top:10px;right:12px;color:var(--red);font-weight:800}

  /* fields */
  .fld-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
  @media(max-width:600px){ .fld-grid{grid-template-columns:1fr} }
  .fld{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem}
  .fld label{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-500)}
  .fld label .req{color:var(--red)}
  .fld input,.fld textarea{font-family:inherit;font-size:1rem;padding:.85rem 1rem;border:1.5px solid rgba(22,40,74,.15);border-radius:12px;background:#fff;color:var(--navy);transition:border .15s}
  .fld input:focus,.fld textarea:focus{outline:none;border-color:var(--navy)}
  .fld textarea{min-height:90px;resize:vertical}

  /* plans */
  .plan-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:900px){ .plan-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:760px){ .plan-grid{grid-template-columns:1fr} }
  .plan{border:2px solid rgba(22,40,74,.12);border-radius:18px;padding:1.6rem 1.3rem;cursor:pointer;transition:all .18s;background:#fff;position:relative;text-align:center}
  .plan:hover{transform:translateY(-3px)}
  .plan.sel{border-color:var(--red);background:var(--blue-pale)}
  .plan .badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.08em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase}
  .plan h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.2rem}
  .plan .freq{font-size:.85rem;color:var(--gray-500);margin-bottom:1rem}
  .plan .price{font-size:2rem;font-weight:800;color:var(--navy)}
  .plan .price s{font-size:1.1rem;color:var(--gray-500);font-weight:600;margin-right:.3rem}
  .plan .per{font-size:.8rem;color:var(--gray-500)}
  .plan .save{margin-top:.8rem;font-size:.85rem;font-weight:700;color:#1a8a4f}
  .plan-perks{list-style:none;padding:0;margin:1rem 0 .8rem;text-align:left}
  .plan-perks li{display:flex;align-items:flex-start;gap:.5rem;font-size:.85rem;line-height:1.35;padding:.35rem 0;color:var(--navy)}
  .plan-perks li.no{color:#aab1bd}
  .plan-perks .pi{flex-shrink:0;font-weight:800;font-size:.8rem}
  .plan-perks li.yes .pi{color:#1a8a4f}
  .plan-perks li.no .pi{color:#d99}
  .plan-annual{margin-top:.6rem;padding-top:.7rem;border-top:1px solid rgba(22,40,74,.1);font-size:.85rem;font-weight:700;color:#1a8a4f}
  .plan-annual.none{color:var(--gray-500)}
  /* add-ons */
  .addon-grid{display:flex;flex-direction:column;gap:12px}
  .addon{display:flex;align-items:center;gap:14px;border:2px solid rgba(22,40,74,.12);border-radius:14px;padding:1.1rem 1.3rem;cursor:pointer;transition:all .15s;background:#fff}
  .addon:hover{border-color:rgba(201,71,58,.4)}
  .addon.sel{border-color:var(--red);background:var(--blue-pale)}
  .addon-check{width:24px;height:24px;border-radius:6px;border:2px solid rgba(22,40,74,.25);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
  .addon.sel .addon-check{background:var(--red);border-color:var(--red)}
  .addon-body{flex:1}
  .addon-t{font-weight:700;color:var(--navy)}
  .addon-d{font-size:.82rem;color:var(--gray-500)}
  .addon-price{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;color:var(--navy)}
  /* bundle */
  .bundle{border:2px solid #1a8a4f;border-radius:18px;padding:1.5rem 1.6rem;background:linear-gradient(180deg,#f3fbf6,#fff);margin-bottom:1.4rem}
  .bundle-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
  .bundle-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;color:var(--navy)}
  .bundle-sub{font-size:.9rem;color:var(--gray-500);margin-bottom:.7rem}
  .bundle-list{list-style:none;padding:0;margin:0}
  .bundle-list li{display:flex;align-items:center;gap:.5rem;font-size:.95rem;color:var(--navy);padding:.2rem 0}
  .bundle-list .pi{color:#1a8a4f;font-weight:800}
  .bundle-price-wrap{text-align:right;flex-shrink:0}
  .bundle-price{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--navy)}
  .bundle-price s{font-size:1.1rem;color:var(--gray-500);font-weight:600;margin-right:.3rem}
  .bundle-save{display:inline-block;margin-top:.3rem;font-size:.85rem;font-weight:700;color:#1a8a4f;background:#e3f6ec;padding:.2rem .6rem;border-radius:20px}
  .bundle-actions{display:flex;gap:12px;margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid rgba(26,138,79,.2)}
  .bundle-btn{border:none;border-radius:30px;padding:.7rem 1.4rem;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
  .bundle-btn.add{background:#1a8a4f;color:#fff;width:100%}
  .bundle-btn.added{background:#eef1f4;color:var(--gray-500);cursor:default}
  .bundle-btn.remove{background:#fff;color:var(--red);border:1.5px solid rgba(201,71,58,.3)}
  .addon-or{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:800;color:var(--navy);margin:0 0 .8rem}

  /* calendar */
  .cal{border:1.5px solid rgba(22,40,74,.12);border-radius:16px;overflow:hidden;max-width:520px;margin:0 auto}
  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem;background:var(--gray-50);font-weight:700}
  .cal-head button{border:none;background:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;box-shadow:var(--shadow)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:.6rem}
  .cal-dow{text-align:center;font-size:.7rem;font-weight:700;color:var(--gray-500);padding:.4rem 0}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .12s}
  .cal-day.empty{cursor:default}
  .cal-day.dis{color:rgba(22,40,74,.25);cursor:not-allowed}
  .cal-day:not(.dis):not(.empty):hover{background:var(--blue-pale)}
  .cal-day.sel{background:var(--navy);color:#fff}
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1.4rem;max-width:520px;margin-left:auto;margin-right:auto}
  @media(max-width:600px){ .slots{grid-template-columns:1fr 1fr} }
  .slot{border:1.5px solid rgba(22,40,74,.15);border-radius:12px;padding:.8rem;text-align:center;cursor:pointer;font-weight:600;transition:all .15s}
  .slot:hover{border-color:var(--navy)}
  .slot.sel{background:var(--red);color:#fff;border-color:var(--red)}

  /* review */
  .rev-box{background:var(--gray-50);border-radius:16px;padding:1.5rem;margin-bottom:1.2rem}
  .rev-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(22,40,74,.08);font-size:.95rem}
  .rev-row:last-child{border-bottom:none}
  .rev-row .k{color:var(--gray-500)}
  .rev-row .v{font-weight:600;text-align:right}
  .rev-total{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:1rem;border-top:2px solid rgba(22,40,74,.12)}
  .rev-total .lbl{font-weight:700}
  .rev-total .amt{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:800;color:var(--red)}

  /* footer nav */
  .qb-nav{display:flex;justify-content:space-between;align-items:center;gap:1rem;max-width:1180px;margin:1.5rem auto 4rem;padding:0 1.25rem}
  .btn{font-family:inherit;font-weight:700;font-size:1rem;border-radius:40px;padding:.9rem 1.8rem;cursor:pointer;border:none;transition:all .18s;display:inline-flex;align-items:center;gap:.5rem}
  .btn-back{background:#fff;color:var(--navy);box-shadow:var(--shadow);width:52px;height:52px;border-radius:50%;padding:0;justify-content:center;font-size:1.3rem}
  .btn-back:hover{transform:translateY(-1px);background:var(--blue-pale)}
  .btn-next{background:var(--red);color:#fff;box-shadow:0 6px 20px rgba(201,71,58,.35)}
  .btn-next:hover{background:#b23a2e;transform:translateY(-1px)}
  .btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .hidden{display:none}
  .info-note{background:#eef4fb;border-radius:12px;padding:.85rem 1.1rem;font-size:.88rem;color:var(--navy);margin-top:1.4rem}
  .success-wrap{text-align:center;padding:2rem 1rem}
  .success-wrap .big{font-family:'Playfair Display',serif;font-size:2.2rem;margin:.5rem 0}
  .err{color:var(--red);font-size:.9rem;margin-top:.6rem;text-align:center}
  .price-pill{display:inline-block;background:var(--navy);color:#fff;font-weight:700;padding:.5rem 1.1rem;border-radius:30px;margin-top:1rem}
</style>
</head>
<body>

<div class="qb-top">
  <div class="qb-top-inner">
    <a href="index.html" class="qb-brand"><img src="logo.png" alt="Clear View"><span>CLEAR VIEW<small>WINDOW CO.</small></span></a>
    <div class="qb-total" id="totalPill">Estimate: <b id="totalAmt">—</b></div>
  </div>
</div>

<div class="qb-progress" id="progress"></div>

<div class="qb-layout">
  <div class="qb-card" id="card"><!-- steps injected --></div>
  <aside class="qb-side" id="sidebar">
    <h2>Property Details</h2>
    <div id="sideRows"></div>
  </aside>
</div>

<div class="qb-nav">
  <button class="btn btn-back" id="backBtn" onclick="prev()" aria-label="Back">←</button>
  <button class="btn btn-next" id="nextBtn" onclick="next()">Continue →</button>
</div>

<script>
  // ---------- CONFIG: real Clear View pricing ----------
  // Pricing is per exterior pane of glass. Each size bracket maps to an
  // estimated pane count (confirmed exactly at the in-person walkthrough).
  // Pricing is per exterior pane of glass; the per-pane RATE scales with how
  // dirty the windows are ($6 recently cleaned → $9 never cleaned).
  const MIN_JOB = 150;         // minimum job price floor
  // Brackets mirror the price book: each tier = a pane count (the value v),
  // mapped to a sq ft range. Pricing = panes × per-pane rate (set by dirtiness).
  const SIZE = [
    {v:28, label:'Up to 2,499 sq ft'},
    {v:43, label:'2,500 – 3,499 sq ft'},
    {v:60, label:'3,500 – 4,999 sq ft'},
    {v:78, label:'5,000 – 6,499 sq ft'},
    {v:96, label:'6,500 – 7,999 sq ft'},
    {v:114,label:'8,000 – 8,999 sq ft'},
    {v:132,label:'9,000 – 9,999 sq ft'},
    {v:-1, label:'10,000+ sq ft (custom quote)'},
  ];
  // Last cleaned sets the per-pane EXTERIOR rate (dirtier = higher rate).
  const LASTCLEANED = [
    {v:7.00,t:'Less than a year',d:'Recently cleaned'},
    {v:8.00,t:'1–2 years',d:'Moderate buildup'},
    {v:9.00,t:'3–5 years',d:'Significant buildup'},
    {v:10.00,t:'Never',d:'First professional cleaning'},
  ];
  // French panes — small % upcharge (grids take a little longer)
  const FRENCH = [
    {v:0,   t:'No',d:'No french pane windows'},
    {v:0.05,t:'Yes, less than 25%',d:'A few french pane windows'},
    {v:0.08,t:'Yes, about 50%',d:'Half of windows are french pane'},
    {v:0.12,t:'Yes, all of them',d:'All windows are french pane style'},
  ];
  // Stories barely matter — only a small bump at 3+
  const STORIES = [{v:1.0,t:'1 Story'},{v:1.0,t:'2 Stories'},{v:1.10,t:'3+ Stories'}];
  // Interior is priced at 3/4 of exterior. Tracks are INCLUDED FREE (no toggle).
  // Screens = $4/screen (count ≈ panes). Solar = $10/panel.
  const INT_FACTOR = 0.75;     // interior = 0.75 × exterior
  const SCREEN_RATE = 4;       // $ per screen
  const SOLAR_RATE = 10;       // $ per solar panel
  const SERVICES = [
    {id:'exterior',t:'Exterior Windows',base:true,d:'Outside glass, pure-water'},
    {id:'interior',t:'Interior Windows',base:true,d:'Inside glass, hand-cleaned'},
    {id:'screens',t:'Screen Cleaning',perScreen:true,d:'$4 per screen, removed & washed'},
    {id:'solar',t:'Solar Panel Cleaning',perPanel:true,d:'$10 per panel, pure-water'},
  ];
  // Flat-dollar discount per visit, with a hard floor so small jobs never
  // drop below PLAN_FLOOR. off = $ off each cleaning; floor = min paid/visit.
  const PLAN_FLOOR = 200;      // post-discount price can never fall below this
  const PLANS = [
    {id:'quarterly',t:'Quarterly',freq:'4 cleanings / year',off:150,save:'$150 off every cleaning',popular:true},
    {id:'triannual',t:'Tri-Annual',freq:'3 cleanings / year',off:100,save:'$100 off every cleaning'},
    {id:'biannual',t:'Biannual',freq:'2 cleanings / year',off:50,save:'$50 off every cleaning'},
    {id:'onetime',t:'One-Time',freq:'Single cleaning',off:0,save:'Flexible · no commitment'},
  ];
  // Plan card perks (RainShield = our deionized pure-water tech, our own name).
  const PLAN_PERKS = ['RainShield Technology','7-Day Rain Guarantee','Free Hard Water Removal (5 panes)'];
  const PLAN_PERK_COUNT = { quarterly:3, biannual:1, onetime:0 };

  // ---------- STATE ----------
  const S = {
    propType:null, size:null, sizeLabel:null, cleaned:null, cleanedLabel:null,
    french:null, frenchLabel:null,
    stories:null, storiesLabel:null, services:['exterior'], solarPanels:0, plan:null,
    name:'',phone:'',email:'',address:'',notes:'',
    date:null, time:null
  };

  // ---------- PRICE ENGINE ----------
  // BASE = exterior only = panes × rate × (1+french).
  // Add-ons (priced separately, NOT discounted by the plan):
  //   interior = INT_FACTOR × exterior base
  //   screens  = panes × SCREEN_RATE
  //   solar    = panels × SOLAR_RATE
  // Plan discount applies to the exterior base only; add-ons stack on after.
  function paneRate(){ return S.cleaned ?? 7.00; }
  function extMultiplier(){
    if(S.size===null) return null;
    if(S.size===-1) return -1; // custom
    const french=S.french??0;
    return (1+french);
  }
  // Exterior base price (before plan discount, before add-ons).
  function extBase(){
    const m=extMultiplier();
    if(m===null) return null;
    if(m===-1) return -1;
    return Math.max(S.size*paneRate()*m, MIN_JOB);
  }
  // Total of selected add-ons (interior, screens, solar). 15% off if bundled.
  // Screens ≈ half the panes (most windows = 2 panes but 1 screen) × $4 each.
  function screenCount(){ return Math.round(S.size/2); }
  const BUNDLE_PCT = 0.15;     // 15% off when interior + screens are bundled
  function addOnTotal(){
    let a=0;
    const eb = S.size*paneRate()*extMultiplier();
    const hasInt=S.services.includes('interior'), hasScr=S.services.includes('screens');
    const intAmt = (hasInt && S.size>0) ? eb*INT_FACTOR : 0;
    const scrAmt = (hasScr && S.size>0) ? screenCount()*SCREEN_RATE : 0;
    a += intAmt + scrAmt;
    if(S.services.includes('solar')) a+=(S.solarPanels||0)*SOLAR_RATE;
    if(hasInt && hasScr) a -= (intAmt+scrAmt)*BUNDLE_PCT;   // 15% bundle discount
    return a;
  }
  // Full price = exterior base + add-ons (used when no plan context).
  function priceBase(){
    const b=extBase();
    if(b===null) return null;
    if(b===-1) return -1;
    return b + addOnTotal();
  }
  // Apply flat $ discount to the EXTERIOR BASE only (floored), then add add-ons.
  function applyPlan(base, off){
    if(base===null) return null;
    if(base===-1) return -1;
    if(!off) return base;
    return Math.max(base - off, PLAN_FLOOR);
  }
  // Plan price: discount hits exterior base, add-ons stack on top undiscounted.
  function priceForPlan(off){
    const b=extBase();
    if(b===null) return null;
    if(b===-1) return -1;
    return applyPlan(b, off) + addOnTotal();
  }
  // Single firm estimate (rounded to nearest $5), after plan off + add-ons.
  function fmtRange(v, planOff){
    const m=extMultiplier();
    if(m===null) return '—';
    if(m===-1) return 'Custom quote';
    const off = (planOff!==undefined ? planOff : (S.plan ? (PLANS.find(p=>p.id===S.plan)?.off||0) : 0));
    const price = Math.round(priceForPlan(off)/5)*5;
    return '$'+price;
  }
  function updateTotal(){
    const pill = document.getElementById('totalPill');
    // Price stays hidden until the customer reaches the plan step.
    const planIdx = steps.findIndex(s=>s.key==='plan');
    if(cur < planIdx){ pill.style.display='none'; return; }
    pill.style.display='';
    const off = S.plan ? (PLANS.find(p=>p.id===S.plan)?.off||0) : 0;
    document.getElementById('totalAmt').textContent = fmtRange(null, off);
  }

  // ---------- STEPS ----------
  // PHASE 1 (intake): property questions + contact. No price shown.
  // PHASE 2 (quote): plan -> add-ons -> schedule. Price appears here.
  const steps = [
    {key:'propType', render:stepPropType, valid:()=>!!S.propType,        phase:1},
    {key:'cleaned',  render:stepCleaned,  valid:()=>S.cleaned!==null,    phase:1},
    {key:'french',   render:stepFrench,   valid:()=>S.french!==null,     phase:1},
    {key:'size',     render:stepSize,     valid:()=>S.size!==null,       phase:1},
    {key:'contact',  render:stepContact,  valid:validContact,            phase:1, last1:true},
    {key:'plan',     render:stepPlan,     valid:()=>!!S.plan,            phase:2},
    {key:'addons',   render:stepAddons,   valid:()=>true,                phase:2},
    {key:'schedule', render:stepSchedule, valid:()=>!!S.date && !!S.time,phase:2},
    {key:'review',   render:stepReview,   valid:()=>true,                phase:2},
  ];
  const TOTAL_STEPS = steps.length;
  let cur=0;

  function renderProgress(){
    const p=document.getElementById('progress'); p.innerHTML='';
    steps.forEach((_,i)=>{ const seg=document.createElement('div'); seg.className='seg '+(i<cur?'done':i===cur?'cur':''); p.appendChild(seg); });
  }
  function renderStep(){
    renderProgress();
    document.getElementById('card').innerHTML = steps[cur].render();
    document.getElementById('backBtn').style.visibility = cur===0?'hidden':'visible';
    const nb=document.getElementById('nextBtn');
    if(cur===steps.length-1){ nb.textContent='Submit Request →'; }
    else if(steps[cur].last1){ nb.textContent='Create My Quote →'; }
    else { nb.textContent='Continue →'; }
    refreshNext();
    if(steps[cur].after) steps[cur].after();
    updateTotal();
    renderSidebar();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function renderSidebar(){
    const rows=[
      {k:'Property Type', v:S.propType?cap(S.propType):null},
      {k:'Last Cleaned',  v:S.cleanedLabel},
      {k:'French Panes',  v:S.frenchLabel},
      {k:'Property Size', v:S.sizeLabel},
    ];
    document.getElementById('sideRows').innerHTML = rows.map(r=>
      `<div class="qb-side-row"><div class="qb-side-k">${r.k}</div><div class="qb-side-v ${r.v?'set':'empty'}">${r.v||'—'}</div></div>`
    ).join('');
  }
  function refreshNext(){ document.getElementById('nextBtn').disabled = !steps[cur].valid(); }
  // Dynamic step number by key, so reordering never breaks the labels.
  function stepNum(key){ return steps.findIndex(s=>s.key===key)+1; }

  function next(){
    if(!steps[cur].valid()) return;
    if(cur===steps.length-1){ submit(); return; }
    cur++; renderStep();
  }
  function prev(){ if(cur>0){cur--;renderStep();} }

  // ---- step renderers ----
  function optCard(sel,onclick,ic,t,d,multi){
    return `<div class="opt ${multi?'multi':''} ${sel?'sel':''}" onclick="${onclick}">${ic?`<div class="ic">${ic}</div>`:''}<div class="t">${t}</div>${d?`<div class="d">${d}</div>`:''}</div>`;
  }

  function stepPropType(){
    const ICO = {
      house:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16284A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/><path d="M10 20v-5h4v5"/></svg>',
      townhome:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16284A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V9l5-4 5 4v12"/><path d="M13 21V11l4-3 4 3v10"/><path d="M6 21v-4h3v4"/><path d="M17 21v-3h2v3"/></svg>',
      condo:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16284A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="1"/><path d="M9 7h0M12 7h0M15 7h0M9 11h0M12 11h0M15 11h0M9 15h0M15 15h0"/><path d="M11 21v-3h2v3"/></svg>'
    };
    const types=[{id:'house',ic:ICO.house,t:'House',d:'Single or multi-level home'},{id:'townhome',ic:ICO.townhome,t:'Townhome',d:'Connected residential unit'},{id:'condo',ic:ICO.condo,t:'Condo',d:'Unit in a shared building'}];
    return `<div class="qb-step-eyebrow">Step ${stepNum('propType')} of 5 · About Your Home</div><h1 class="qb-h">What type of property do you have?</h1><p class="qb-sub">Select the option that best describes your home.</p>
    <div class="opt-grid cols-3">${types.map(x=>optCard(S.propType===x.id,`pick('propType','${x.id}')`,x.ic,x.t,x.d)).join('')}</div>`;
  }
  function stepCleaned(){
    return `<div class="qb-step-eyebrow">Step ${stepNum('cleaned')} of 5 · About Your Home</div><h1 class="qb-h">When were your windows last professionally cleaned?</h1><p class="qb-sub">This helps us understand the current condition.</p>
    <div class="opt-grid cols-3">${LASTCLEANED.map(x=>optCard(S.cleanedLabel===x.t,`pickCleaned(${x.v},'${x.t}')`,'',x.t,x.d)).join('')}</div>`;
  }
  function stepFrench(){
    return `<div class="qb-step-eyebrow">Step ${stepNum('french')} of 5 · About Your Home</div><h1 class="qb-h">Do you have French panes?</h1><p class="qb-sub">Grid-style windows take longer to clean — this keeps your quote accurate.</p>
    <div class="opt-grid cols-2">${FRENCH.map(x=>optCard(S.frenchLabel===x.t,`pickFrench(${x.v},'${x.t}')`,'',x.t,x.d)).join('')}</div>
    <div class="info-note"><b>Info:</b> French pane windows require additional cleaning time due to their grid patterns and multiple glass sections.</div>`;
  }
  function stepSize(){
    return `<div class="qb-step-eyebrow">Step ${stepNum('size')} of 5 · About Your Home</div><h1 class="qb-h">How big is your property?</h1><p class="qb-sub">Select the option that best describes your property.</p>
    <div class="opt-grid cols-3">${SIZE.map((x,i)=>optCard(S.size===x.v,`pickSize(${x.v},${i})`,'',x.label,'')).join('')}</div>`;
  }
  function stepPlan(){
    if(!S.plan) S.plan='quarterly';   // recurring plan is the default path
    const cards = PLANS.map(p=>{
      const m=extMultiplier();
      let priceHtml;
      if(m===-1){ priceHtml='<div class="price">Custom</div>'; }
      else {
        const full = fmtRange(null,0);          // undiscounted price (anchor)
        const disc = fmtRange(null,p.off);       // after flat off + floor
        const showStrike = p.off>0 && full!==disc;
        priceHtml = `<div class="price">${showStrike?`<s>${full}</s>`:''}${disc}<span class="per"> / cleaning</span></div>`;
      }
      const nPerks = PLAN_PERK_COUNT[p.id] ?? 0;
      const perks = PLAN_PERKS.map((perk,i)=>{
        const on = i < nPerks;
        return `<li class="${on?'yes':'no'}"><span class="pi">${on?'✓':'✕'}</span> ${perk}</li>`;
      }).join('');
      const annual = p.off>0 ? `<div class="plan-annual">Annual savings: $${p.off * (p.id==='quarterly'?4:2)}</div>` : `<div class="plan-annual none">No savings</div>`;
      return `<div class="plan ${S.plan===p.id?'sel':''}" onclick="pickPlan('${p.id}')">${p.popular?'<span class="badge">★ Most Popular</span>':''}<h3>${p.t}</h3><div class="freq">${p.freq}</div>${priceHtml}<ul class="plan-perks">${perks}</ul>${annual}</div>`;
    }).join('');
    return `<div class="qb-step-eyebrow">Step 1 of 3 · Your Quote</div><h1 class="qb-h">Pick your plan.</h1><p class="qb-sub">The more we visit, the more you save. Cancel anytime.</p>
    <div class="plan-grid">${cards}</div>
    <div class="info-note">Recurring plans lock in your discount on every visit. Final price confirmed at your free in-person walkthrough.</div>`;
  }
  function stepAddons(){
    const eb = S.size*paneRate()*extMultiplier();
    const intPrice = Math.round(eb*INT_FACTOR/5)*5;
    const scrPrice = screenCount()*SCREEN_RATE;
    const bundleFull = intPrice + scrPrice;
    const bundleSave = Math.round(bundleFull*BUNDLE_PCT/5)*5;
    const bundlePrice = bundleFull - bundleSave;
    const bundleActive = S.services.includes('interior') && S.services.includes('screens');

    // ----- bundle card (Interior + Screens, 15% off) -----
    const bundleCard = `
      <div class="bundle ${bundleActive?'sel':''}">
        <div class="bundle-top">
          <div>
            <div class="bundle-name">ClearView Bundle</div>
            <div class="bundle-sub">Bundle &amp; save 15%!</div>
            <ul class="bundle-list">
              <li><span class="pi">✓</span> Interior Window Cleaning</li>
              <li><span class="pi">✓</span> Screen Cleaning</li>
            </ul>
          </div>
          <div class="bundle-price-wrap">
            <div class="bundle-price"><s>$${bundleFull}</s> $${bundlePrice}</div>
            <div class="bundle-save">Save $${bundleSave}</div>
          </div>
        </div>
        <div class="bundle-actions">
          ${bundleActive
            ? `<button type="button" class="bundle-btn added" disabled>✓ Bundle Added</button>
               <button type="button" class="bundle-btn remove" onclick="setBundle(false)">✕ Remove Bundle</button>`
            : `<button type="button" class="bundle-btn add" onclick="setBundle(true)">+ Add Bundle &amp; Save 15%</button>`}
        </div>
      </div>`;

    // ----- individual add-on rows -----
    const items=[
      {id:'interior',t:'Interior Window Cleaning',price:'$'+intPrice},
      {id:'screens', t:'Screen Cleaning',price:'$'+scrPrice},
      {id:'solar',   t:'Solar Panel Cleaning',price:(S.solarPanels?('$'+(S.solarPanels*SOLAR_RATE)):'$10/panel')},
    ];
    const rows=items.map(x=>{
      const on=S.services.includes(x.id);
      return `<div class="addon ${on?'sel':''}" onclick="toggleSvc('${x.id}')">
        <div class="addon-check">${on?'✓':''}</div>
        <div class="addon-body"><div class="addon-t">${x.t}</div></div>
        <div class="addon-price">${x.price}</div>
      </div>`;
    }).join('');

    const solarInput = S.services.includes('solar')
      ? `<div class="fld" style="margin-top:1rem"><label>How many solar panels? <span class="req">*</span></label><input id="f_solar" type="number" min="0" value="${S.solarPanels||''}" oninput="S.solarPanels=parseInt(this.value)||0;document.getElementById('card').innerHTML=stepAddons();updateTotal()" placeholder="e.g. 12"></div>`
      : '';

    return `<div class="qb-step-eyebrow">Step 2 of 3 · Your Quote</div><h1 class="qb-h">Pick your add-ons.</h1><p class="qb-sub">Add-ons are optional. Sill &amp; track detailing is always included free.</p>
    ${bundleCard}
    <div class="addon-or">Or choose individual add-ons</div>
    <div class="addon-grid">${rows}</div>
    ${solarInput}
    <div class="info-note">Add-ons apply to your initial visit and can be added to future visits anytime.</div>`;
  }
  function stepContact(){
    return `<div class="qb-step-eyebrow">Step ${stepNum('contact')} of 5 · About Your Home</div><h1 class="qb-h">Your contact info.</h1><p class="qb-sub">So we can confirm your appointment and price.</p>
    <div class="fld-grid">
      <div class="fld"><label>Name <span class="req">*</span></label><input id="f_name" value="${S.name}" oninput="S.name=this.value;refreshNext()" placeholder="Full name"></div>
      <div class="fld"><label>Phone <span class="req">*</span></label><input id="f_phone" value="${S.phone}" oninput="S.phone=this.value;refreshNext()" placeholder="(860) 000-0000"></div>
    </div>
    <div class="fld"><label>Email</label><input id="f_email" value="${S.email}" oninput="S.email=this.value" placeholder="you@email.com"></div>
    <div class="fld"><label>Property Address <span class="req">*</span></label><input id="f_addr" value="${S.address}" oninput="S.address=this.value;refreshNext()" placeholder="Street, Town, CT"></div>
    <div class="fld"><label>Notes (optional)</label><textarea id="f_notes" oninput="S.notes=this.value" placeholder="Gate codes, pets, special requests, approx window count...">${S.notes}</textarea></div>`;
  }
  // calendar state
  let calView=new Date(); calView.setDate(1);
  function stepSchedule(){
    return `<div class="qb-step-eyebrow">Step 3 of 3 · Your Quote</div><h1 class="qb-h">Request your date.</h1><p class="qb-sub">Pick a preferred day and time — we'll confirm availability and lock it in.</p>
    <div id="calMount"></div>
    <div id="slotMount"></div>
    <div class="info-note">This is a <b>request</b>, not a locked booking — we'll text or call to confirm your exact time.</div>`;
  }
  function stepReview(){
    const addonNames={interior:'Interior Windows',screens:'Screen Cleaning',solar:'Solar Panels'};
    const addons = S.services.filter(id=>id!=='exterior').map(id=>addonNames[id]||id);
    const svc = ['Exterior Windows'].concat(addons).join(', ');
    const plan = PLANS.find(p=>p.id===S.plan);
    const off = plan?plan.off:0;
    return `<div class="qb-step-eyebrow">Review &amp; Confirm</div><h1 class="qb-h">Review &amp; submit.</h1><p class="qb-sub">Please review your details below. We'll follow up shortly to confirm.</p>
    <div class="rev-box">
      <div class="rev-row"><span class="k">Property</span><span class="v">${cap(S.propType)} · ${S.sizeLabel}</span></div>
      <div class="rev-row"><span class="k">Last cleaned</span><span class="v">${S.cleanedLabel}</span></div>
      <div class="rev-row"><span class="k">French panes</span><span class="v">${S.frenchLabel}</span></div>
      <div class="rev-row"><span class="k">Services</span><span class="v">${svc}</span></div>
      <div class="rev-row"><span class="k">Plan</span><span class="v">${plan.t} (${plan.freq})</span></div>
      <div class="rev-row"><span class="k">Contact</span><span class="v">${S.name} · ${S.phone}</span></div>
      <div class="rev-row"><span class="k">Address</span><span class="v">${S.address}</span></div>
      <div class="rev-row"><span class="k">Requested</span><span class="v">${S.date} · ${S.time}</span></div>
      <div class="rev-total"><span class="lbl">Estimated price${off>0?` ($${off} off / visit)`:''}</span><span class="amt">${fmtRange(null, off)}</span></div>
    </div>
    <div class="info-note">Final price confirmed at your free in-person walkthrough. Fully insured · $1M coverage.</div>
    <div id="submitErr" class="err"></div>`;
  }

  // ---- pick handlers ----
  // No auto-advance: selecting an option just updates state + UI.
  // The customer moves forward with the Continue button.
  function advance(){ /* auto-advance disabled — use Next button */ }
  function pick(key,val){ S[key]=val; if(key==='propType'){} renderStep(); advance(); }
  function pickSize(v,i){ S.size=v; S.sizeLabel=SIZE[i].label; renderStep(); advance(); }
  function pickCleaned(v,t){ S.cleaned=v; S.cleanedLabel=t; renderStep(); advance(); }
  function pickFrench(v,t){ S.french=v; S.frenchLabel=t; renderStep(); advance(); }
  function pickStories(v,t){ S.stories=v; S.storiesLabel=t; renderStep(); advance(); }
  function pickPlan(id){ S.plan=id; renderStep(); advance(); }
  function toggleSvc(id){
    const i=S.services.indexOf(id);
    if(i>=0) S.services.splice(i,1); else S.services.push(id);
    if(id==='solar' && i>=0) S.solarPanels=0;   // reset count if solar removed
    document.getElementById('card').innerHTML=stepAddons();
    refreshNext(); updateTotal();
  }
  function setBundle(on){
    ['interior','screens'].forEach(id=>{
      const i=S.services.indexOf(id);
      if(on && i<0) S.services.push(id);
      if(!on && i>=0) S.services.splice(i,1);
    });
    document.getElementById('card').innerHTML=stepAddons();
    refreshNext(); updateTotal();
  }
  function validContact(){ return S.name.trim() && S.phone.trim().length>=7 && S.address.trim(); }
  function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):''; }

  // ---- calendar ----
  function renderCal(){
    const mount=document.getElementById('calMount'); if(!mount) return;
    const today=new Date(); today.setHours(0,0,0,0);
    const y=calView.getFullYear(), m=calView.getMonth();
    const first=new Date(y,m,1).getDay();
    const days=new Date(y,m+1,0).getDate();
    const monthName=calView.toLocaleString('en-US',{month:'long',year:'numeric'});
    let cells='';
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
    for(let i=0;i<first;i++) cells+='<div class="cal-day empty"></div>';
    for(let d=1;d<=days;d++){
      const date=new Date(y,m,d);
      const iso=date.toISOString().slice(0,10);
      const past=date<today;
      const sun=date.getDay()===0;
      const dis=past||sun;
      const sel=S.date===prettyDate(date);
      cells+=`<div class="cal-day ${dis?'dis':''} ${sel?'sel':''}" ${dis?'':`onclick="pickDate('${iso}')"`}>${d}</div>`;
    }
    mount.innerHTML=`<div class="cal"><div class="cal-head"><button onclick="calMove(-1)">‹</button><span>${monthName}</span><button onclick="calMove(1)">›</button></div><div class="cal-grid">${cells}</div></div>`;
    renderSlots();
  }
  function prettyDate(date){ return date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
  function calMove(n){ calView.setMonth(calView.getMonth()+n); renderCal(); }
  function pickDate(iso){ const d=new Date(iso+'T00:00'); S.date=prettyDate(d); S.dateISO=iso; S.time=null; renderCal(); refreshNext(); }
  function renderSlots(){
    const mount=document.getElementById('slotMount'); if(!mount) return;
    if(!S.date){ mount.innerHTML=''; return; }
    const times=['8:00 AM','9:00 AM','10:00 AM','11:00 AM','1:00 PM','2:00 PM','3:00 PM','4:00 PM'];
    mount.innerHTML=`<div style="text-align:center;font-weight:700;margin-top:1.4rem">${S.date}</div><div class="slots">${times.map(t=>`<div class="slot ${S.time===t?'sel':''}" onclick="pickTime('${t}')">${t}</div>`).join('')}</div>`;
  }
  function pickTime(t){ S.time=t; renderSlots(); refreshNext(); }

  // attach calendar render after schedule step
  steps.find(s=>s.key==='schedule').after=renderCal;

  // ---- submit ----
  async function submit(){
    const btn=document.getElementById('nextBtn'); btn.disabled=true; btn.textContent='Sending...';
    const plan=PLANS.find(p=>p.id===S.plan);
    const off=plan?plan.off:0;
    const svcList=S.services.map(id=>SERVICES.find(s=>s.id===id).t).join(', ');
    const notes=[
      `Quote Builder lead`,
      `Property: ${cap(S.propType)}, ${S.sizeLabel}`,
      `Condition: last cleaned ${S.cleanedLabel}`,
      `French panes: ${S.frenchLabel}`,
      `Services: ${svcList}`,
      `Plan: ${plan.t} (${plan.freq})`,
      `Est. price: ${fmtRange(null, off)}`,
      `Requested: ${S.date} at ${S.time}`,
      S.notes?`Customer notes: ${S.notes}`:''
    ].filter(Boolean).join('\n');
    // Build ISO start/end from the picked date + time slot (2hr window).
    function toISO(dateISO, timeStr){
      if(!dateISO || !timeStr) return null;
      const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if(!m) return null;
      let h = parseInt(m[1],10); const min = parseInt(m[2],10);
      const pm = /PM/i.test(m[3]);
      if(pm && h!==12) h+=12; if(!pm && h===12) h=0;
      // Build a Date from the customer's local wall-clock time, then send true UTC —
      // Flyra parses these as UTC, so naive local strings showed jobs 4h early.
      const d = new Date(`${dateISO}T${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:00`);
      return d.toISOString();
    }
    const startISO = toISO(S.dateISO, S.time);
    const endISO = startISO ? new Date(new Date(startISO).getTime() + 2*60*60*1000).toISOString() : null;
    const estDollars = (function(){ const p=priceForPlan(off); return (p===null||p===-1)?null:Math.round(p/5)*5; })();
    const fullNotes = notes + (S.address?`\nAddress: ${S.address}`:'');
    try{
      const r = await fetch('/api/lead', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          name: S.name,
          phone: S.phone,
          email: S.email||null,
          address: S.address||null,
          service: svcList,
          notes: fullNotes,
          scheduled_start: startISO,
          scheduled_end: endISO,
          price: estDollars
        })
      });
      if(!r.ok){ throw new Error('lead post failed: '+r.status); }
      document.getElementById('card').innerHTML=`<div class="success-wrap"><div style="font-size:3rem">✓</div><div class="big">Request received!</div><p style="color:var(--gray-500);max-width:480px;margin:0 auto 1rem">Thanks ${S.name.split(' ')[0]||''} — we've got your details and your requested time of <b>${S.date} at ${S.time}</b>. We'll confirm by phone or text shortly.</p><div class="price-pill">Estimated: ${fmtRange(null, off)}</div><div style="margin-top:1.5rem"><a href="index.html" class="btn btn-next">Back to home →</a></div></div>`;
      document.querySelector('.qb-nav').style.display='none';
      document.getElementById('progress').style.display='none';
      window.scrollTo({top:0,behavior:'smooth'});
    }catch(e){
      console.error(e);
      btn.disabled=false; btn.textContent='Submit Request →';
      const el=document.getElementById('submitErr'); if(el) el.textContent='Could not submit — please call us at (860) 966-3149 and we\'ll take care of it.';
    }
  }

  renderStep();
</script>
</body>
</html>
